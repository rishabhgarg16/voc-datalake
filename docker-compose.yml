services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: voc_datalake
      POSTGRES_USER: voc
      POSTGRES_PASSWORD: voc_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voc -d voc_datalake"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://voc:voc_secret@postgres:5432/voc_datalake
      DATABASE_URL_SYNC: postgresql://voc:voc_secret@postgres:5432/voc_datalake
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./sampledata:/data:ro
      - ./backend/app:/code/app
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:8001

volumes:
  pgdata:
