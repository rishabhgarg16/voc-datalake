name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd backend
          railway link --project 2be0cc27-1f3c-4463-bb1e-37a929f69fb5 --service backend --environment production
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify Deployment
        run: |
          sleep 45
          curl -sf https://backend-production-ee55b.up.railway.app/api/health
        timeout-minutes: 2
